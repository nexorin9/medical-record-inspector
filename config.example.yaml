# Medical Record Interpreter - 配置文件示例
# 复制此文件为 config.yaml 并填写实际值

# 相似度阈值 (0-1)，低于此值的病历标记为异常
similarity_threshold: 0.7

# 异常检测灵敏度 (0-1)
anomaly_sensitivity: 0.95

# LLM 配置（用于生成解释报告）
llm:
  model: gpt-4
  api_base: https://api.openai.com/v1
  temperature: 0.3
  max_tokens: 500

# 嵌入模型配置
embedder:
  model: BAAI/bge-micro-v2
  device: auto  # auto/cuda/cpu

# 缺陷定位器配置
locator:
  chunk_size: 5
  min_chunk_length: 50
