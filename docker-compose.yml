version: '3.8'

services:
  medical-record-inspector:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount standard cases (optional, for custom templates)
      - ./data/standard_cases:/app/data/standard_cases:ro
      # Mount history directory for persistence
      - ./data/history:/app/data/history
      # Mount logs directory
      - ./logs:/app/logs
      # Mount reports directory
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
